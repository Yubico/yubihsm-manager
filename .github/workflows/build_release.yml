name: "Release builds"

on: [push]

jobs:

  source:
    name: Build source release
    runs-on: ubuntu-latest
    env:
      VERSION: 1.0.0RC1
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - name: Create tar.gz
        run: |
          set -x
          ./resources/release/make_src_dist.sh $VERSION
          mkdir $GITHUB_WORKSPACE/artifact
          mv $GITHUB_WORKSPACE/../yubihsm-manager-$VERSION.tar.gz $GITHUB_WORKSPACE/artifact/
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: yubihsm-manager-src
          path: artifact

  licenses:
    name: Collect third-party licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install cargo-about
        run: cargo install cargo-about --version '~0.6'

      - name: Generate license bundle
        run: |
          cat > about.toml << 'EOF'
          accepted = [
            "Apache-2.0",
            "MIT",
            "BSD-2-Clause",
            "BSD-3-Clause",
            "MPL-2.0",
            "ISC",
            "Unicode-3.0",
            "Zlib",
          ]
          EOF

          cat > about.hbs << 'TEMPLATE'
          Third Party Licenses
          ====================

          {{#each licenses}}
          ================================================================================
          {{name}}
          ================================================================================
          Used by:
          {{#each used_by}}
            - {{crate.name}} v{{crate.version}}
          {{/each}}

          {{text}}

          {{/each}}
          TEMPLATE

          cargo about generate about.hbs > THIRDPARTY.txt

      - name: Upload license bundle
        uses: actions/upload-artifact@v5
        with:
          name: licenses
          path: THIRDPARTY.txt

  debian_based:
    needs: licenses
    strategy:
      fail-fast: false
      matrix:
        environment: [
          "ubuntu:25.10",
          "ubuntu:24.04",
          "ubuntu:22.04",
          "debian:13",
          "debian:12",
        ]
        libyubihsm_tag : [ "2.7.3" ]
        version: [ "1.0.0RC1" ]

    name: build on ${{ matrix.environment }}
    runs-on: ubuntu-latest
    container: ${{ matrix.environment }}

    steps:

      - name: clone repository
        uses: actions/checkout@v5
        with:
          path: yubihsm-manager

      - name: Download license bundle
        uses: actions/download-artifact@v5
        with:
          name: licenses
          path: yubihsm-manager/

      - name: extract platform name
        env:
          DOCKER_IMAGE: ${{ matrix.environment }}
        run: |
          # Remove everything from DOCKER_IMAGE that is not a letter or a number
          PLATFORM=$(echo -n "$DOCKER_IMAGE" | sed -E 's/[^a-zA-Z0-9]//g')
          echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV

      - name: install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -x
          export DEBIAN_FRONTEND=noninteractive

          apt-get update && apt-get dist-upgrade -y
          apt-get install -y build-essential      \
                                  chrpath              \
                                  cmake                \
                                  pkg-config           \
                                  gengetopt            \
                                  help2man             \
                                  libedit-dev          \
                                  libcurl4-openssl-dev \
                                  liblzma-dev          \
                                  libssl-dev           \
                                  libseccomp-dev       \
                                  libusb-1.0.0-dev     \
                                  dh-exec              \
                                  git-buildpackage     \
                                  curl                 \
                                  libpcsclite-dev      \
                                  file                 \
                                  curl                 \
                                  jq                   \
                                  zlib1g-dev

          curl -o rustup.sh https://sh.rustup.rs
          bash ./rustup.sh -y
          export PATH=$PATH:$HOME/.cargo/bin
          cargo install cargo-deb


      - name: install libyubihsm
        working-directory: yubihsm-manager
        env:
          LIBYUBIHSM_TAG: ${{ matrix.libyubihsm_tag }}
          PLATFORM: ${{ env.PLATFORM }}
        run: |
          set -x

          echo "platform = $PLATFORM"

          cd ..

          git clone --branch $LIBYUBIHSM_TAG https://github.com/Yubico/yubihsm-shell.git
          #git clone https://github.com/Yubico/yubihsm-shell.git
          cd yubihsm-shell

          if [ "$PLATFORM" = "ubuntu2404" ] || [ "$PLATFORM" = "ubuntu2504" ] || [ "$PLATFORM" = "ubuntu2510" ]; then
            # ubuntu 24.04 and newer come with _FORTIFY_SOURCE already set
            sed -i 's/add_definitions (-D_FORTIFY_SOURCE=2)/add_definitions (-D_FORTIFY_SOURCE=3)/' cmake/SecurityFlags.cmake
          fi

          #if [ "$PLATFORM" = "ubuntu2504" ] || [ "$PLATFORM" = "debian13" ] || [ "$PLATFORM" = "ubuntu2510" ]; then
            # Set PCSC flags
            #sed -i 's/#SET(CMAKE_C_FLAGS/SET(CMAKE_C_FLAGS/' ykhsmauth/CMakeLists.txt
          #fi

          mkdir build && cd build
          cmake -DDISABLE_LTO=1 -DCMAKE_BUILD_TYPE=Release -DBUILD_ONLY_LIB=ON -DENABLE_STATIC=ON -DENABLE_CERT_COMPRESS=OFF -DWITHOUT_MANPAGES=1 -S ..
          cmake --build . --target yubihsm_static
          
          mkdir static_lib
          cp lib/libyubihsm.a static_lib/

      - name: Build release binaries
        working-directory: yubihsm-manager
        env:
          PLATFORM: ${{ env.PLATFORM }}
        run: |
          set -x -e
                    
          #OUTPUT=$GITHUB_WORKSPACE/$PLATFORM/yubihsm-manager
          #mkdir -p $OUTPUT

          export PATH=$PATH:$HOME/.cargo/bin
          
          YUBIHSM_STATIC=1 YUBIHSM_LIB_DIR=$GITHUB_WORKSPACE/yubihsm-shell/build/static_lib  cargo build --release -vv
          strip --strip-all target/release/yubihsm-manager
          ldd target/release/yubihsm-manager
          
          cargo deb --no-build
          #cp target/debian/*.deb $OUTPUT/

          dpkg -i target/debian/*.deb
          yubihsm-manager --version
          yubihsm-manager --help

      - name: Pack artifact
        working-directory: yubihsm-manager
        env:
          PLATFORM: ${{ env.PLATFORM }}
          VERSION: ${{ matrix.version }}
        run: |
          set -x -e
          OUTPUT=$GITHUB_WORKSPACE/$PLATFORM/yubihsm-manager
          mkdir -p $OUTPUT
          cp target/debian/*.deb $OUTPUT/

          LICENSE=$OUTPUT/share/yubihsm-manager/licenses
          mkdir -p $LICENSE
          cp LICENSE $LICENSE/yubihsm-manager.txt
          cp THIRDPARTY.txt $LICENSE/

          cd $OUTPUT/
          rm -f yubihsm-manager-$PLATFORM-amd64.tar.gz
          tar -C .. -zcvf ../yubihsm-manager-$VERSION-$PLATFORM-amd64.tar.gz yubihsm-manager
          rm -f *.deb
          rm -rf ../yubihsm-manager

      - name: upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: "yubihsm-manager-${{ env.PLATFORM }}-amd64"
          path: ${{ env.PLATFORM }}

  redhat_based:
    needs: licenses
    strategy:
      fail-fast: false
      matrix:
        environment: [
          "fedora:43",
          "fedora:42",
        ]
        libyubihsm_tag: [ "2.7.3" ]
        version: [ "1.0.0RC1" ]

    name: build on ${{ matrix.environment }}
    runs-on: ubuntu-latest
    container: ${{ matrix.environment }}

    steps:

      - name: clone the repository
        uses: actions/checkout@v5
        with:
          path: yubihsm-manager

      - name: Download license bundle
        uses: actions/download-artifact@v5
        with:
          name: licenses
          path: yubihsm-manager/

      - name: extract platform name
        env:
          DOCKER_IMAGE: ${{ matrix.environment }}
        run: |
          # Remove everything from DOCKER_IMAGE that is not a letter or a number
          PLATFORM=$(echo -n "$DOCKER_IMAGE" | sed -E 's/[^a-zA-Z0-9]//g')
          echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV

      - name: install dependencies
        env:
          PLATFORM: ${{ env.PLATFORM }}
        run: |
          dnf -y update
          dnf -y install  binutils         \
                          gcc              \
                          gcc-c++          \
                          git              \
                          chrpath          \
                          cmake            \
                          gengetopt        \
                          openssl-devel    \
                          libedit-devel    \
                          libcurl-devel    \
                          rpmdevtools      \
                          pcsc-lite-devel  \
                          libusb1-devel    \
                          help2man         \
                          zlib-devel

          curl -o rustup.sh https://sh.rustup.rs
          bash ./rustup.sh -y

      - name: install libyubihsm
        env:
          LIBYUBIHSM_TAG: ${{ matrix.libyubihsm_tag }}
        run: |
          git clone --branch $LIBYUBIHSM_TAG https://github.com/Yubico/yubihsm-shell.git
          #git clone https://github.com/Yubico/yubihsm-shell.git

          cd yubihsm-shell
          mkdir build && cd build
          cmake -DDISABLE_LTO=1 -DCMAKE_BUILD_TYPE=Release -DBUILD_ONLY_LIB=ON -DENABLE_STATIC=ON -DENABLE_CERT_COMPRESS=OFF -DWITHOUT_MANPAGES=1 -S ..
          cmake --build . --target yubihsm_static

          mkdir static_lib
          cp lib/libyubihsm.a static_lib/

      - name: build release binary
        working-directory: yubihsm-manager
        env:
          PLATFORM: ${{ env.PLATFORM }}
        run: |
          set -x

          export PATH=$PATH:~/.cargo/bin
          if [[ ! -x $(command -v rustc) ]]; then
            curl -o rustup.sh https://sh.rustup.rs
            bash ./rustup.sh -y
          fi

          #OUTPUT=$GITHUB_WORKSPACE/$PLATFORM/yubihsm-manager
          #mkdir -p $OUTPUT

          YUBIHSM_STATIC=1 YUBIHSM_LIB_DIR=$GITHUB_WORKSPACE/yubihsm-shell/build/static_lib cargo build --release
          ldd target/release/yubihsm-manager

          #if [ $PLATFORM == "fedora43" ]; then
          export BIN_DIR=$GITHUB_WORKSPACE/yubihsm-manager/target/release
          rpmbuild -bb resources/release/linux/yubihsm-manager.spec
          #cp /github/home/rpmbuild/RPMS/x86_64/yubihsm-manager-*.rpm $OUTPUT/
          #else
            #cargo install cargo-rpm
            #cargo rpm init
            #YUBIHSM_LIB_DIR=/usr/lib64 cargo rpm build
            #cp target/release/rpmbuild/RPMS/x86_64/*.rpm $OUTPUT/
          #fi

          yum install -y /github/home/rpmbuild/RPMS/x86_64/yubihsm-manager-*.rpm
          yubihsm-manager --version
          yubihsm-manager --help

      - name: Pack artifact
        working-directory: yubihsm-manager
        env:
          PLATFORM: ${{ env.PLATFORM }}
          VERSION: ${{ matrix.version }}
        run: |
          OUTPUT=$GITHUB_WORKSPACE/$PLATFORM/yubihsm-manager
          mkdir -p $OUTPUT
          cp /github/home/rpmbuild/RPMS/x86_64/yubihsm-manager-*.rpm $OUTPUT/

          LICENSE=$OUTPUT/share/yubihsm-manager/licenses
          mkdir -p $LICENSE
          cp LICENSE $LICENSE/yubihsm-manager.txt
          cp THIRDPARTY.txt $LICENSE/

          cd $OUTPUT
          rm -f yubihsm-manager-$PLATFORM-amd64.tar.gz
          tar -C .. -zcvf ../yubihsm-manager-$VERSION-$PLATFORM-amd64.tar.gz yubihsm-manager
          rm -f *.deb
          rm -rf ../yubihsm-manager

      - name: upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: "yubihsm-manager-${{ env.PLATFORM }}-amd64"
          path: ${{ env.PLATFORM }}

  Windows:
    needs: licenses
    name: Windows
    runs-on: windows-latest
    env:
      VERSION: 1.0.0RC1
      LIBYUBIHSM_TAG: 2.7.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download license bundle
        uses: actions/download-artifact@v5
        with:
          name: licenses
          path: .

      - name: Install dependencies
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSDebug -Trace 1

          C:/vcpkg/vcpkg.exe update
          C:/vcpkg/vcpkg.exe install openssl:x64-windows-static

      # downloads and build yubihsm-shell from source release on dev.y.c
      - name: install yubihsm-shell
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSDebug -Trace 1

          $env:OPENSSL_ROOT_DIR ="C:/vcpkg/packages/openssl_x64-windows"

          #Invoke-WebRequest -Uri https://developers.yubico.com/yubihsm-shell/Releases/yubihsm-shell-$env:LIBYUBIHSM_TAG-win64.msi -OutFile yubihsm-shell.msi -UseBasicParsing
          #$log = "$env:GITHUB_WORKSPACE\install.log"
          #$procMain = Start-Process "msiexec" "/i `"yubihsm-shell.msi`" /qn /l*! `"$log`"" -NoNewWindow -PassThru
          #$procMain.WaitForExit()

          git clone --branch $env:LIBYUBIHSM_TAG --single-branch https://github.com/Yubico/yubihsm-shell.git
          #git clone https://github.com/Yubico/yubihsm-shell.git
          cd yubihsm-shell
          mkdir build; cd build
          cmake -S .. -A x64 -DCMAKE_BUILD_TYPE=Release -DBUILD_ONLY_LIB=ON -DENABLE_STATIC=ON -DENABLE_CERT_COMPRESS=OFF -DWITHOUT_MANPAGES=1
          cmake --build . -v --config Release --target yubihsm_static


      - name: Build yubihsm-manager
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSDebug -Trace 1

          mkdir -p $env:GITHUB_WORKSPACE/artifact/yubihsm-manager/bin

          rustup target add x86_64-pc-windows-msvc
          rustup default stable-x86_64-pc-windows-msvc

          $env:RUST_BACKTRACE=1
          $env:YUBIHSM_LIB_DIR="$env:GITHUB_WORKSPACE/yubihsm-shell/build/lib/Release"
          $env:YUBIHSM_LIB_NAME="yubihsm"
          $env:OPENSSL_STATIC="1"
          $env:OPENSSL_DIR="C:/vcpkg/packages/openssl_x64-windows-static"

          #$env:PATH+=";$env:GITHUB_WORKSPACE/yubihsm-shell/build/bin/Release;C:/vcpkg/packages/openssl_x64-windows/bin"

          cargo.exe update
          cargo.exe build --release
          install target/release/yubihsm-manager $env:GITHUB_WORKSPACE/artifact/yubihsm-manager/bin

      - name: Test binaries
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSDebug -Trace 1
          cd artifact/yubihsm-manager/bin

          ./yubihsm-manager.exe --help
          ./yubihsm-manager.exe --version

      - name: Pack licenses
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSDebug -Trace 1

          mkdir -p $env:GITHUB_WORKSPACE/artifact/yubihsm-manager/licenses
          cp $env:GITHUB_WORKSPACE/LICENSE $env:GITHUB_WORKSPACE/artifact/yubihsm-manager/licenses/yubihsm-manager.txt
          cp $env:GITHUB_WORKSPACE/THIRDPARTY.txt $env:GITHUB_WORKSPACE/artifact/yubihsm-manager/licenses/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: yubihsm-manager-${{ env.VERSION }}-win64
          path: artifact

  MacOS-AMD:
    name: MacOS AMD
    runs-on: macos-latest-large
    env:
      VERSION: 1.0.0RC1
      LIBYUBIHSM_TAG: 2.7.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build yubihsm-manager
        run: |
          set -e -o pipefail
          set -x
          
          SRC_DIR=$(pwd)
          chmod +x resources/release/macos/make_release_binaries.sh
          ./resources/release/macos/make_release_binaries.sh amd $VERSION $LIBYUBIHSM_TAG $SRC_DIR
          
          mkdir -p $GITHUB_WORKSPACE/artifact/amd/          
          install target/release/yubihsm-manager $GITHUB_WORKSPACE/artifact/amd/

          cd $GITHUB_WORKSPACE/artifact/amd

          otool -L yubihsm-manager
          #otool -l yubihsm-manager | grep LC_RPATH -A 3

          ./yubihsm-manager --version
          ./yubihsm-manager --help

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: yubihsm-manager-macos-amd
          path: artifact

  MacOS-universal:
    name: MacOS-universal
    needs: [licenses, MacOS-AMD]
    runs-on: macos-latest-xlarge
    env:
      VERSION: 1.0.0RC1
      LIBYUBIHSM_TAG: 2.7.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download license bundle
        uses: actions/download-artifact@v5
        with:
          name: licenses
          path: .

      - name: Download AMD artifact
        uses: actions/download-artifact@v5
        with:
          name: yubihsm-manager-macos-amd
          path: .

      - name: Build yubihsm-manager
        run: |
          set -e -o pipefail
          set -x
          
          SRC_DIR=$(pwd)
          chmod +x resources/release/macos/make_release_binaries.sh
          ./resources/release/macos/make_release_binaries.sh arm $VERSION $LIBYUBIHSM_TAG $SRC_DIR
          
          mkdir -p $GITHUB_WORKSPACE/arm/
          install target/release/yubihsm-manager $GITHUB_WORKSPACE/arm/

          cd $GITHUB_WORKSPACE/arm
          
          otool -L yubihsm-manager
          #otool -l yubihsm-manager | grep LC_RPATH -A 3

          ./yubihsm-manager --version
          ./yubihsm-manager --help

      - name: Create universal binaries
        run: |
          set -e -o pipefail
          set -x

          mkdir -p $GITHUB_WORKSPACE/artifact/usr/local/bin

          lipo -create -output $GITHUB_WORKSPACE/artifact/usr/local/bin/yubihsm-manager $GITHUB_WORKSPACE/arm/yubihsm-manager $GITHUB_WORKSPACE/amd/yubihsm-manager

      - name: Bundle licenses
        run: |
          set -e -o pipefail
          set -x

          LICENSE=$GITHUB_WORKSPACE/artifact/usr/local/share/yubihsm-manager/licenses
          mkdir -p $LICENSE
          cp LICENSE $LICENSE/yubihsm-manager.txt
          cp THIRDPARTY.txt $LICENSE/

      - name: Pack installer scripts
        run: |
          set -e -o pipefail
          set -x

          cp resources/release/macos/* $GITHUB_WORKSPACE/artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: yubihsm-manager-macos-universal
          path: artifact
